title: "My Automation Dashboard"
subtitle: "24/7 Local Stack"
logo: ""
columns: 3
connectivityCheck: true

services:
  - name: Observability
    icon: "fas fa-chart-line"
    items:
      - name: Grafana
        subtitle: Metrics & dashboards
        url: http://localhost:3000
        icon: "fas fa-chart-pie"
      - name: Prometheus
        subtitle: Metrics DB
        url: http://localhost:9090
        icon: "fas fa-database"
      - name: Loki API
        subtitle: Log store API
        url: http://localhost:3100
        icon: "fas fa-stream"
      - name: Dozzle
        subtitle: Live container logs
        url: http://localhost:9999
        icon: "fas fa-clipboard-list"
  - name: Automation
    icon: "fas fa-cogs"
    items:
      - name: Task Service
        subtitle: API & scheduler
        url: http://localhost:8000/docs
        icon: "fas fa-tasks"
      - name: Node-RED
        subtitle: Low-code flows
        url: http://localhost:1880
        icon: "fas fa-project-diagram"
  - name: Management
    icon: "fas fa-tools"
    items:
      - name: Portainer
        subtitle: Docker management UI
        url: http://localhost:9000
        icon: "fas fa-server"
      - name: Homer
        subtitle: This dashboard
        url: http://localhost:8080
        icon: "fas fa-home"